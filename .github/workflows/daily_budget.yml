name: Daily Budget Monitor

on:
  schedule:
    - cron: '0 11 * * *'  # 08:00 ART
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONPATH: .

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set DATABASE_URL default si no hay secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL=sqlite:///sql_app.db" >> $GITHUB_ENV
            echo "No hay secret, usando sqlite:///sql_app.db"
          else
            echo "DATABASE_URL ya configurada desde secret."
          fi

      - name: Seed base 2023 si no existe DB
        run: |
          if [ ! -f sql_app.db ]; then
            python -m scripts.seed_2023
          else
            echo "DB ya existe, salteando seed 2023."
          fi

      - name: Cargar presupuesto base 2026 si no existe
        run: |
          python -c "
          from sqlalchemy import create_engine, text
          import os
          url = os.environ.get('DATABASE_URL', 'sqlite:///sql_app.db')
          engine = create_engine(url)
          with engine.connect() as c:
              n = c.execute(text('SELECT COUNT(1) FROM presupuesto_base WHERE ejercicio=2026')).scalar()
              print(f'Filas 2026 en DB: {n}')
              exit(0 if n > 0 else 1)
          " && echo "2026 ya está en DB." || python -m scripts.load_2026_to_db

      - name: Sincronizar crédito vigente 2024/2025/2026
        run: python -m scripts.sync_modificaciones

      - name: Commit DB actualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sql_app.db data/ || true
          git diff --staged --quiet || git commit -m "chore: sync presupuesto $(date +'%Y-%m-%d')"
          git push || true