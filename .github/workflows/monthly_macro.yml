name: monthly_macro

on:
  schedule:
    - cron: '0 12 16 * *'   # día 16 de cada mes a las 12:00 UTC (09:00 AR)
  workflow_dispatch:         # permite correrlo manualmente desde GitHub

  jobs:
    update_macro:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run seed_macro_indices
        run: python scripts/seed_macro_indices.py

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seeds/macro_indices.csv
          if git diff --staged --quiet; then
            echo "Sin cambios en macro_indices"
          else
            git commit -m "chore: actualización mensual macro_indices — IPC y TC $(date +'%Y-%m')"
            git push
          fi